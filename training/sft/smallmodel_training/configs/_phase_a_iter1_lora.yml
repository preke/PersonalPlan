task: llm-sft

base_model: /root/autodl-tmp/Qwen3-8B-Instruct
project_name: maple-sdp-onpolicy-iter1

log: tensorboard
backend: local

data:
  chat_template: tokenizer
  path: data/joint/iter1/phase_a
  train_split: train
  valid_split: train
  column_mapping:
    text_column: messages

params:
  block_size: 4096
  model_max_length: 4096
  epochs: 1
  batch_size: 1
  lr: 5e-5
  peft: true
  quantization: none
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: all-linear
  gradient_accumulation: 16
  optimizer: adamw_torch
  scheduler: cosine
  weight_decay: 0.0
  warmup_ratio: 0.1
  mixed_precision: bf16
