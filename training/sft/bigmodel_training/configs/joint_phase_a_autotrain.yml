# TRL SFTTrainer config for Stage 2 Phase B: on-policy SDP SFT
#
# Data is generated by:
#   python joint_alignment_data.py phase-a \
#       --src data/raw/train.jsonl \
#       --base-model /root/autodl-tmp/Qwen-32B-Instruct \
#       --pad-adapter ./maple-pad-sft \
#       --samples-per-query 1 --out data/joint/iter1/phase_b_sdp_sft
#
# Training: same SFT task as Stage 2, but inputs use sampled PAD scaffolds
# instead of gold (T*, A*) — this is the on-policy distillation correction
# (paper §4 Phase A).
#
# Initialise the LoRA from the Stage-2 SDP adapter so we continue training
# the same parameters rather than starting from scratch.

task: llm-sft

base_model: /root/autodl-tmp/Qwen-32B-Instruct
project_name: maple-sdp-onpolicy

log: tensorboard
backend: local

data:
  path: data/joint/iter1/phase_b_sdp_sft
  train_split: train
  valid_split: train          # phase-A produces a single file; re-use for eval signal
  chat_template: tokenizer
  column_mapping:
    text_column: messages

params:
  trainer: sft
  peft: true
  # Resume from the Stage-1 SDP adapter rather than init-from-scratch.
  # train_sft_lora.py loads this adapter with PEFT and keeps it trainable.
  peft_model: ./maple-sdp-sft
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: all-linear

  block_size: 4096
  model_max_length: 4096

  epochs: 1                   # phase-A is a corrective pass, not a fresh train
  batch_size: 1
  gradient_accumulation: 16
  lr: 5.0e-5                  # lower than Stage-2 (we're refining, not training from cold)
  optimizer: paged_adamw_8bit
  scheduler: cosine
  warmup_ratio: 0.1
  weight_decay: 0.0

  mixed_precision: bf16
  #quantization: int4
  disable_gradient_checkpointing: false

  logging_steps: 5
  eval_strategy: steps
  eval_steps: 50
  save_strategy: epoch
  save_total_limit: 2

  seed: 42

hub:
  push_to_hub: false
  username: local
  token: dummy
