task: llm-dpo

base_model: /root/autodl-tmp/Qwen-32B-Instruct
project_name: maple-pad-dpo-iter1

log: tensorboard
backend: local

data:
  chat_template: none
  path: data/joint/iter1/phase_b
  train_split: train
  valid_split: train
  column_mapping:
    prompt_text_column: prompt
    text_column: chosen
    rejected_text_column: rejected

params:
  trainer: dpo
  peft: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: all-linear
  dpo_beta: 0.1
  max_prompt_length: 2048
  block_size: 4096
  model_max_length: 4096
  epochs: 1
  batch_size: 1
  gradient_accumulation: 16
  lr: 5.0e-6
  optimizer: paged_adamw_8bit
  scheduler: cosine
  warmup_ratio: 0.1
  weight_decay: 0.0
  mixed_precision: bf16
  quantization: int4
  disable_gradient_checkpointing: false
  logging_steps: 5
  eval_strategy: steps
  save_total_limit: 2
  seed: 42

hub:
  push_to_hub: false
  username: local
  token: dummy
