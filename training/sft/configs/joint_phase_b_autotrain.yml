# AutoTrain config for Stage 3 Phase B — PAD DPO with SDP-perplexity preferences
#
# Data is generated by:
#   python joint_alignment_data.py phase-b \
#       --src multi_agent_dataset_filtered_qap_v3.jsonl \
#       --base-model Qwen/Qwen2.5-7B-Instruct \
#       --pad-adapter ./maple-pad-sft \
#       --sdp-adapter ./maple-sdp-sft \
#       --pairs-per-query 1 --out data/joint/phase_b
#
# Output: refined PAD adapter that prefers scaffolds the SDP critic finds
# easy to ground (paper §4 Phase B).
#
# The reference policy for DPO is the Stage-1 PAD adapter (`peft_model`);
# β controls how much the policy can move away from it (paper uses β=0.1).

task: llm-dpo

base_model: Qwen/Qwen2.5-7B-Instruct
project_name: maple-pad-dpo

log: tensorboard
backend: local

data:
  path: data/joint/phase_b
  train_split: train
  valid_split: train         # again, re-use train rows for eval signal
  column_mapping:
    prompt_column: prompt
    text_column: chosen
    rejected_text_column: rejected

params:
  trainer: dpo
  use_peft: true
  peft_method: lora
  # Continue from the Stage-1 PAD adapter (becomes the DPO reference policy).
  peft_model: ./maple-pad-sft
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: all-linear

  dpo_beta: 0.1
  max_prompt_length: 2048
  block_size: 4096
  model_max_length: 4096

  epochs: 1
  batch_size: 1
  gradient_accumulation: 16
  lr: 5.0e-6                 # DPO learning rate is typically much lower than SFT
  optimizer: paged_adamw_8bit
  scheduler: cosine
  warmup_ratio: 0.1
  weight_decay: 0.0

  mixed_precision: bf16
  quantization: int4
  gradient_checkpointing: true

  logging_steps: 5
  evaluation_strategy: steps
  eval_steps: 50
  save_strategy: epoch
  save_total_limit: 2

  seed: 42

hub:
  push_to_hub: false
