# AutoTrain config for Stage 3 Phase A — on-policy SDP SFT
#
# Data is generated by:
#   python joint_alignment_data.py phase-a \
#       --src multi_agent_dataset_filtered_qap_v3.jsonl \
#       --base-model Qwen/Qwen2.5-7B-Instruct \
#       --pad-adapter ./maple-pad-sft \
#       --samples-per-query 1 --out data/joint/phase_a
#
# Training: same SFT task as Stage 2, but inputs use sampled PAD scaffolds
# instead of gold (T*, A*) — this is the on-policy distillation correction
# (paper §4 Phase A).
#
# Initialise the LoRA from the Stage-2 SDP adapter so we continue training
# the same parameters rather than starting from scratch.

task: llm-sft

base_model: Qwen/Qwen2.5-7B-Instruct
project_name: maple-sdp-onpolicy

log: tensorboard
backend: local

data:
  path: data/joint/phase_a
  train_split: train
  valid_split: train          # phase-A produces a single file; re-use for eval signal
  chat_template: tokenizer
  column_mapping:
    text_column: messages

params:
  trainer: sft
  use_peft: true
  peft_method: lora
  # Resume from the Stage-2 SDP adapter rather than init-from-scratch.
  # AutoTrain CLI flag is `peft_model` in current YAML schema; if your
  # version uses a different flag (e.g. `resume_from`), substitute it.
  peft_model: ./maple-sdp-sft
  lora_r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules: all-linear

  block_size: 8192
  model_max_length: 8192

  epochs: 1                   # phase-A is a corrective pass, not a fresh train
  batch_size: 1
  gradient_accumulation: 16
  lr: 5.0e-5                  # lower than Stage-2 (we're refining, not training from cold)
  optimizer: paged_adamw_8bit
  scheduler: cosine
  warmup_ratio: 0.0
  weight_decay: 0.01

  mixed_precision: bf16
  quantization: int4
  gradient_checkpointing: true

  logging_steps: 5
  evaluation_strategy: steps
  eval_steps: 50
  save_strategy: epoch
  save_total_limit: 2

  seed: 42

hub:
  push_to_hub: false
